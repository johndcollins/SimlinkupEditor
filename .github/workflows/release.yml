name: Release

# Builds the Windows installer and attaches it to a GitHub Release whenever
# a tag matching `v*` (e.g. `v1.0.0`, `v1.0.0-beta`) is pushed.
#
# Usage:
#   1. Bump `version` in package.json (e.g. "1.0.1")
#   2. git commit -am "Release v1.0.1"
#   3. git tag v1.0.1
#   4. git push && git push --tags
#
# The workflow takes ~5–10 minutes the first time (Windows runner cold start +
# electron-builder downloading its toolchain). Subsequent runs are faster
# thanks to the npm cache.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create/update Releases and upload assets

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        # electron-builder reads package.json's `build` block. Output goes
        # to `dist/` per the configured `directories.output`.
        run: npm run make
        env:
          # Disable code signing — we don't ship a certificate. Users see
          # the standard Windows SmartScreen warning on first install,
          # which is normal for unsigned open-source apps.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer to GitHub Release
        # softprops/action-gh-release auto-creates the Release for the tag
        # if it doesn't exist yet, then uploads the listed files as assets.
        uses: softprops/action-gh-release@v2
        with:
          # Match anything electron-builder put in dist/. The default
          # filename is "SimLinkup Profile Editor Setup <version>.exe";
          # the glob keeps this resilient to filename changes.
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          # Generate notes from commit messages between the previous tag
          # and this one. You can manually edit them after the workflow
          # runs.
          generate_release_notes: true
          # Mark prereleases automatically when the tag has a hyphen suffix
          # (v1.0.0-beta, v1.0.0-rc1, etc.).
          prerelease: ${{ contains(github.ref_name, '-') }}
